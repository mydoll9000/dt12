<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tra cứu định mức TT12</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

input{
width:500px;
padding:10px;
font-size:18px;
}

.result{
padding:8px;
border-bottom:1px solid #333;
cursor:pointer;
}

.result:hover{
background:#222;
}

.norm{
margin-top:20px;
background:#222;
padding:20px;
}
</style>

</head>

<body>

<h2>Tra cứu định mức TT12</h2>

<input id="search" placeholder="Nhập mã định mức...">

<div id="results"></div>

<div id="norm"></div>

<script>

const search = document.getElementById("search")
const results = document.getElementById("results")
const norm = document.getElementById("norm")

search.addEventListener("input", async () => {

let q = search.value

if(q.length < 2){
results.innerHTML=""
return
}

let res = await fetch("/search?q=" + q)
let data = await res.json()

results.innerHTML=""

data.forEach(item => {

let div = document.createElement("div")

div.className="result"

div.innerText = item.code + " - " + item.description

div.onclick = () => loadNorm(item.code)

results.appendChild(div)

})

})

async function loadNorm(code){

let res = await fetch("/norm/" + code)

let data = await res.json()

norm.innerHTML = "<h3>"+code+"</h3>"

data.forEach(r => {

norm.innerHTML += "<div>"+r.resource_type+" : "+r.resource_id+" ("+r.quantity+")</div>"

})

}

</script>

</body>
</html>
